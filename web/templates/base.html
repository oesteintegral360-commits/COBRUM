<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- viewport: clave para que se vea bien en cualquier dispositivo -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}COBRUM{% endblock %}</title>
  <!-- Tailwind por CDN: sin paso de build, listo para usar -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/estilos.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-slate-900 tracking-tight">COBRUM</a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="/clientes" class="text-slate-600 hover:text-blue-600">Cobranzas</a>
        <a href="/cobros" class="text-slate-600 hover:text-blue-600">Caja</a>
        <a href="/planes" class="text-slate-600 hover:text-blue-600">Planes</a>
        <a href="/configuracion" class="text-slate-600 hover:text-blue-600">Configuración</a>
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block contenido %}{% endblock %}
  </main>
</body>
</html>
